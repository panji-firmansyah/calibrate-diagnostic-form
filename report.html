<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALIBRATE — Personalized Talent Scorecard</title>

<!-- Open Graph -->
<meta property="og:title" content="CALIBRATE — Personalized Talent Scorecard">
<meta property="og:description" content="Personalized scorecard hasil diagnostic talent organisasi Anda dari event CALIBRATE Dinner.">
<meta property="og:image" content="https://www.calibrate-dayalima.com/assets/logo-dayalima.png">
<meta property="og:url" content="https://www.calibrate-dayalima.com/report">
<meta property="og:type" content="website">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap');

  :root {
    --c-bg: #FAFAFA;
    --c-card: #FFFFFF;
    --c-text: #1A1A1A;
    --c-muted: #777777;
    --c-light: #AEAEAE;
    --c-border: #EBEBEB;
    /* DLG Brand: Red + White */
    --c-brand: #C41230;
    --c-brand-dark: #9E0E27;
    --c-brand-light: #FDF0F2;
    --c-brand-medium: #F5D0D6;
    /* Maturity bands */
    --c-reactive: #C41230;
    --c-reactive-bg: #FDF0F2;
    --c-developing: #E07C24;
    --c-developing-bg: #FFF3E6;
    --c-proactive: #2B7A4B;
    --c-proactive-bg: #EDF7F0;
    --c-optimized: #0D6EAE;
    --c-optimized-bg: #EBF4FB;
    /* Bars */
    --c-bar-you: #C41230;
    --c-bar-avg: #E8E8E8;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.65;
    min-height: 100vh;
    font-size: 14px;
  }

  /* --- NAV BAR --- */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: #FFFFFF;
    border-bottom: 1px solid var(--c-border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    color: var(--c-brand);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .nav-brand svg { flex-shrink: 0; }
  .nav-sep { color: var(--c-border); font-size: 18px; }
  .nav-calibrate {
    font-weight: 700; font-size: 13px;
    color: var(--c-text); letter-spacing: 1.5px;
    text-transform: uppercase; white-space: nowrap;
  }
  .nav select {
    background: #F5F5F5;
    color: var(--c-text); border: 1px solid var(--c-border);
    padding: 7px 12px; border-radius: 6px; font-size: 13px;
    max-width: 300px; flex: 1;
    font-family: var(--font);
  }
  #bdFilter {
    background: var(--c-brand); color: #fff;
    border: 1px solid var(--c-brand); font-weight: 600;
    padding: 7px 12px; border-radius: 6px; font-size: 13px;
    font-family: var(--font); cursor: pointer;
    max-width: 180px;
  }
  #bdFilter option { background: #fff; color: var(--c-text); font-weight: 400; }
  .bd-counter {
    font-size: 12px; color: var(--c-muted);
    font-weight: 600; white-space: nowrap;
  }
  .nav-actions { margin-left: auto; display: flex; gap: 6px; }
  .nav-btn {
    background: #F5F5F5; color: var(--c-text);
    border: 1px solid var(--c-border);
    padding: 7px 12px; border-radius: 6px; cursor: pointer;
    font-size: 12px; transition: all 0.2s;
    font-family: var(--font);
  }
  .nav-btn:hover { background: #EAEAEA; }
  .nav-btn.primary {
    background: var(--c-brand); color: white;
    border-color: var(--c-brand);
  }
  .nav-btn.primary:hover { background: var(--c-brand-dark); }

  /* --- MAIN LAYOUT --- */
  .container { max-width: 860px; margin: 0 auto; padding: 28px 24px; }

  /* --- LOADING / ERROR --- */
  .state-msg {
    text-align: center; padding: 80px 24px;
    color: var(--c-muted); font-size: 15px;
  }

  /* --- HEADER CARD --- */
  .header-card {
    background: white;
    border-radius: 12px;
    padding: 36px 40px;
    margin-bottom: 20px;
    border: 1px solid var(--c-border);
    position: relative;
    overflow: hidden;
  }
  .header-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--c-brand), var(--c-brand-dark));
  }
  .header-eyebrow {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 2.5px; color: var(--c-brand);
    font-weight: 600; margin-bottom: 8px;
  }
  .header-name {
    font-size: 26px; font-weight: 800;
    color: var(--c-text); margin-bottom: 4px;
  }
  .header-role {
    font-size: 14px; color: var(--c-muted);
    font-weight: 400;
  }
  .header-meta {
    margin-top: 16px; font-size: 11px; color: var(--c-light);
    border-top: 1px solid var(--c-border); padding-top: 12px;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .header-meta span { display: flex; align-items: center; gap: 4px; }

  /* --- SCORE HERO --- */
  .score-hero {
    display: grid; grid-template-columns: 200px 1fr; gap: 20px;
    margin-bottom: 20px;
  }
  .score-circle-wrap {
    background: white; border-radius: 12px;
    padding: 28px; text-align: center;
    border: 1px solid var(--c-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-circle {
    width: 100px; height: 100px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    border: 4px solid var(--c-border);
    margin-bottom: 12px;
  }
  .score-number { font-size: 36px; font-weight: 800; line-height: 1; }
  .score-of { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
  .band-badge {
    display: inline-block; padding: 5px 16px;
    border-radius: 16px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.3px;
  }
  .band-reactive { background: var(--c-reactive-bg); color: var(--c-reactive); }
  .band-developing { background: var(--c-developing-bg); color: var(--c-developing); }
  .band-proactive { background: var(--c-proactive-bg); color: var(--c-proactive); }
  .band-optimized { background: var(--c-optimized-bg); color: var(--c-optimized); }

  .score-insights {
    background: white; border-radius: 12px;
    border: 1px solid var(--c-border);
    display: grid; grid-template-columns: 1fr 1fr;
  }
  .insight-cell {
    padding: 20px 24px;
    border-bottom: 1px solid var(--c-border);
  }
  .insight-cell:nth-child(odd) { border-right: 1px solid var(--c-border); }
  .insight-cell:nth-last-child(-n+2) { border-bottom: none; }
  .insight-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .insight-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--c-muted);
    font-weight: 600; margin-bottom: 4px;
    display: flex; align-items: center;
  }
  .insight-value { font-size: 14px; font-weight: 600; color: var(--c-text); }
  .insight-sub { font-size: 12px; color: var(--c-muted); margin-top: 2px; font-weight: 400; }

  /* --- CARDS --- */
  .card {
    background: white; border-radius: 12px;
    padding: 28px 32px; margin-bottom: 20px;
    border: 1px solid var(--c-border);
  }
  .card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--c-border);
  }
  .card-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .card-icon.red { background: var(--c-brand-light); color: var(--c-brand); }
  .card-icon.neutral { background: #F0F0F0; color: #555; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--c-text); }
  .card-subtitle { font-size: 12px; color: var(--c-muted); font-weight: 400; }

  /* --- BENCHMARK BARS --- */
  .bench-row { margin-bottom: 18px; }
  .bench-row:last-child { margin-bottom: 0; }
  .bench-dim {
    font-size: 12px; font-weight: 600; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .bench-dim-name { color: var(--c-text); }
  .bench-dim-score { font-size: 12px; }
  .bench-dim-score .you { color: var(--c-brand); font-weight: 700; }
  .bench-dim-score .avg { color: var(--c-muted); }

  .bench-track {
    height: 8px; background: #F0F0F0; border-radius: 4px;
    position: relative; overflow: visible; margin-bottom: 3px;
  }
  .bench-fill {
    height: 100%; border-radius: 4px; position: absolute; top: 0; left: 0;
    transition: width 0.5s ease;
  }
  .bench-fill.you { background: var(--c-brand); z-index: 2; }
  .bench-fill.avg { background: var(--c-bar-avg); z-index: 1; }
  .bench-avg-marker {
    position: absolute; top: -3px; width: 2px; height: 14px;
    background: #999; z-index: 3; border-radius: 1px;
  }
  .bench-vs {
    font-size: 11px; color: var(--c-muted);
  }
  .bench-vs.above { color: var(--c-proactive); }
  .bench-vs.below { color: var(--c-reactive); }

  .bench-footnote {
    margin-top: 20px; padding-top: 14px;
    border-top: 1px solid var(--c-border);
    font-size: 11px; color: var(--c-light);
  }

  /* --- NARRATIVE --- */
  .narrative {
    font-size: 14px; line-height: 1.8; color: #333;
  }
  .narrative p { margin-bottom: 12px; }
  .narrative p:last-child { margin-bottom: 0; }

  /* --- RC CARDS --- */
  .rc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .rc-item {
    background: #FAFAFA; border: 1px solid var(--c-border);
    border-radius: 8px; padding: 16px;
  }
  .rc-q {
    font-size: 11px; font-weight: 600; color: var(--c-brand);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .rc-a {
    font-size: 13px; color: #444;
    font-style: italic; line-height: 1.6;
  }

  /* --- BD NOTES --- */
  .bd-content {
    background: #F9F9F9; border-radius: 8px;
    padding: 20px; border-left: 3px solid var(--c-brand-medium);
    font-size: 13px; color: #555; line-height: 1.75;
  }

  /* --- RECOMMENDATION --- */
  .rec-block { margin-bottom: 16px; }
  .rec-block:last-child { margin-bottom: 0; }
  .rec-heading {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--c-brand);
    margin-bottom: 6px; padding-bottom: 4px;
    border-bottom: 2px solid var(--c-brand-light);
  }
  .rec-body { font-size: 14px; line-height: 1.8; color: #333; }
  .rec-body p { margin-bottom: 8px; }

  /* --- SECTION LOCKED --- */
  .section-locked { position: relative; overflow: hidden; }
  .section-locked .card-body { filter: blur(3px); opacity: 0.3; pointer-events: none; min-height: 80px; }
  .lock-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px; z-index: 2;
  }
  .lock-text { font-size: 13px; color: var(--c-muted); font-weight: 500; }

  /* --- CTA --- */
  .cta-card {
    background: white;
    border: 2px solid var(--c-brand);
    border-radius: 12px;
    padding: 32px; margin-bottom: 20px;
    text-align: center;
  }
  .cta-title {
    font-size: 17px; font-weight: 700; color: var(--c-text);
    margin-bottom: 6px;
  }
  .cta-desc { font-size: 13px; color: var(--c-muted); margin-bottom: 20px; line-height: 1.6; }
  .cta-btn {
    display: inline-block;
    background: var(--c-brand); color: white;
    padding: 12px 32px; border-radius: 8px;
    font-weight: 600; text-decoration: none;
    font-size: 13px; transition: background 0.2s;
    font-family: var(--font);
  }
  .cta-btn:hover { background: var(--c-brand-dark); }

  /* --- FOOTER --- */
  .footer {
    text-align: center; padding: 24px;
    font-size: 11px; color: var(--c-light);
    margin-top: 8px;
  }
  .footer-brand { font-weight: 700; color: var(--c-muted); }

  /* --- NO DATA --- */
  .no-data-state { text-align: center; padding: 48px 32px; }
  .no-data-state h2 { font-size: 18px; color: var(--c-text); margin-bottom: 8px; }
  .no-data-state p { color: var(--c-muted); font-size: 13px; max-width: 460px; margin: 0 auto; line-height: 1.7; }

  /* --- EXPORT INSTRUCTIONS MODAL --- */
  .export-instructions { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .ei-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
  .ei-modal {
    position: relative; background: white; border-radius: 16px; max-width: 460px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden;
  }
  .ei-header {
    padding: 20px 24px; font-weight: 700; font-size: 16px; color: var(--c-text);
    border-bottom: 1px solid #F0F0F0;
  }
  .ei-body { padding: 20px 24px; }
  .ei-body p { font-size: 13.5px; color: var(--c-muted); line-height: 1.6; margin: 0 0 16px; }
  .ei-steps { display: flex; flex-direction: column; gap: 14px; }
  .ei-step {
    display: flex; gap: 14px; align-items: flex-start;
    font-size: 13.5px; color: var(--c-text); line-height: 1.5;
  }
  .ei-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--c-brand); color: white; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .ei-note { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
  .ei-footer {
    padding: 16px 24px; border-top: 1px solid #F0F0F0;
    display: flex; justify-content: flex-end; gap: 10px;
  }
  .ei-btn {
    padding: 10px 20px; border-radius: 8px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .ei-btn.secondary { background: #F3F3F3; color: var(--c-text); }
  .ei-btn.secondary:hover { background: #E8E8E8; }
  .ei-btn.primary { background: var(--c-brand); color: white; }
  .ei-btn.primary:hover { background: #A30F28; }

  /* --- PRINT / PDF --- */
  @media print {
    /*
     * PENTING: Di dialog Save as PDF, set Margins = "None".
     * Margin di-handle oleh CSS di bawah, bukan oleh browser.
     */
    @page {
      margin: 18mm 14mm 20mm 14mm; /* top right bottom left */
      size: A4;
    }
    body { background: white; font-size: 11.5px; line-height: 1.55; }
    .nav { display: none !important; }
    #bdFilter, .bd-counter, .login-overlay { display: none !important; }
    .export-instructions { display: none !important; }
    .container { padding: 0; max-width: 100%; }

    /* Color preservation */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

    /* Remove shadows, keep borders */
    .card, .header-card, .score-circle-wrap, .score-insights, .cta-card {
      box-shadow: none !important;
      border: 1px solid #E5E5E5;
    }
    .header-card { border-top: none; } /* keep the gradient ::before */

    /* --- PAGE BREAK RULES --- */
    /* Never split these inside */
    .header-card,
    .score-hero,
    .card,
    .rc-item,
    .bd-content,
    .cta-card {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* Each major section starts clean if needed */
    .section-title {
      break-after: avoid !important;
      page-break-after: avoid !important;
    }

    /* Benchmark section - keep header + bars together */
    .bench-row {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* RC grid - allow break between items but not inside */
    .rc-grid {
      break-inside: auto;
    }

    /* CTA always on last page */
    .cta-card {
      break-before: auto;
      margin-top: 12px;
    }

    /* Tighten spacing for PDF */
    .container > * { margin-bottom: 12px; }
    .card { padding: 20px; }
    .header-card { padding: 24px 28px; margin-bottom: 12px; }

    /* Recommendation section — allow page breaks inside (it's long) */
    .card:has(.rec-content) {
      break-inside: auto !important;
      page-break-inside: auto !important;
    }
    /* But keep each recommendation sub-section together */
    .rec-content p,
    .rec-content ol,
    .rec-heading {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }
    /* Keep heading with its following content */
    .rec-heading {
      break-after: avoid !important;
      page-break-after: avoid !important;
    }

    /* BD notes card — also can be long, allow breaks */
    .card:has(.bd-content) {
      break-inside: auto !important;
      page-break-inside: auto !important;
    }

    /* Diagnostic summary — allow breaks for long narratives */
    .card:has(.narrative) {
      break-inside: auto !important;
      page-break-inside: auto !important;
    }
    .narrative p {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* Footer — static, not fixed (fixed causes overlap) */
    .footer {
      position: static !important;
      text-align: center; font-size: 9px; color: #999;
      padding: 16px 0 8px;
      border-top: 1px solid #EEE;
      margin-top: 20px;
      break-inside: avoid;
    }

    /* CTA card — keep together, don't let it orphan */
    .cta-card {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 640px) {
    .score-hero { grid-template-columns: 1fr; }
    .score-insights { grid-template-columns: 1fr; }
    .insight-cell:nth-child(odd) { border-right: none; }
    .rc-grid { grid-template-columns: 1fr; }
    .header-card { padding: 28px 24px; }
    .card { padding: 24px 20px; }
    .nav { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
    .nav-brand img { height: 24px !important; }
    .nav-brand { font-size: 11px; gap: 6px; }
    .nav-sep { font-size: 14px; }
    .nav-calibrate { font-size: 11px; letter-spacing: 1px; }
    .nav select { max-width: 100%; order: 5; flex-basis: 100%; }
    #bdFilter { order: 4; flex-basis: 100%; max-width: 100%; }
    .header-meta { flex-direction: column; gap: 4px; }
  }
  /* --- LOGIN OVERLAY — Dark Galaxy Glassmorphism Theme --- */
  .login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #0A0A0A;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    font-family: var(--font);
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.012) 100%),
      radial-gradient(ellipse at 50% 0%, rgba(196,30,58,0.06) 0%, transparent 70%);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border: 1.5px solid rgba(196,30,58,0.35);
    border-top-color: rgba(196,30,58,0.53);
    border-bottom-color: rgba(196,30,58,0.13);
    border-radius: 16px;
    padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow:
      0 0 12px rgba(196,30,58,0.15),
      0 0 60px rgba(196,30,58,0.06),
      inset 0 1px 0 rgba(255,255,255,0.03);
    text-align: center;
    position: relative; z-index: 1;
    overflow: hidden;
    animation: loginGlow 5s ease-in-out infinite;
  }
  /* Glassmorphism top-edge highlight */
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    z-index: 2;
  }
  /* Subtle radial glow behind card */
  .login-card::after {
    content: '';
    position: absolute; top: -40%; left: -20%; right: -20%; bottom: 60%;
    background: radial-gradient(ellipse at center, rgba(196,30,58,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  @keyframes loginGlow {
    0%, 100% { box-shadow: 0 0 12px rgba(196,30,58,0.15), 0 0 60px rgba(196,30,58,0.06), inset 0 1px 0 rgba(255,255,255,0.03); }
    50% { box-shadow: 0 0 20px rgba(196,30,58,0.28), 0 0 80px rgba(196,30,58,0.10), inset 0 1px 0 rgba(255,255,255,0.05); }
  }
  .login-brand {
    font-size: 10px; font-weight: 500; color: #64748B;
    letter-spacing: 0.25em; text-transform: uppercase;
    margin-bottom: 12px;
    position: relative; z-index: 1;
  }
  .login-card h2 {
    font-size: 2rem; font-weight: 900; color: #FFFFFF;
    margin: 0 0 4px; letter-spacing: 0.12em; text-transform: uppercase;
    font-family: 'Playfair Display', Georgia, serif;
    line-height: 1;
    position: relative; z-index: 1;
  }
  .login-card .login-sub {
    font-size: 0.75rem; font-weight: 600; color: #C41E3A;
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 28px;
    position: relative; z-index: 1;
  }
  .login-card form { position: relative; z-index: 1; }
  /* Input group — icon + field */
  .login-input-group {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 0 16px;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    background: rgba(0,0,0,0.35);
    margin-bottom: 12px; box-sizing: border-box;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .login-input-group:focus-within {
    border-color: #C41E3A;
    box-shadow: 0 0 0 2px rgba(196,30,58,0.15);
  }
  .login-input-group svg {
    flex-shrink: 0; opacity: 0.4;
  }
  .login-input-group input {
    flex: 1; border: none; background: transparent;
    padding: 12px 0; font-size: 14px; font-family: var(--font);
    color: #FFFFFF; outline: none;
  }
  .login-input-group input::placeholder { color: #64748B; }
  .login-toggle-pass {
    background: none; border: none; cursor: pointer;
    padding: 4px; display: flex; align-items: center;
    opacity: 0.3; transition: opacity 0.15s;
  }
  .login-toggle-pass:hover { opacity: 0.6; }
  .login-card .login-btn {
    width: 100%; padding: 13px;
    background: #C41E3A; color: #FFFFFF;
    border: none; border-radius: 8px;
    font-size: 0.875rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    font-family: var(--font); cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    margin-top: 4px;
    box-shadow: 0 4px 16px rgba(196,30,58,0.25);
  }
  .login-card .login-btn:hover {
    background: #E02040;
    box-shadow: 0 6px 24px rgba(196,30,58,0.35);
  }
  .login-card .login-btn:active { transform: scale(0.99); }
  .login-error {
    color: #EF4444; font-size: 12px;
    margin-top: 12px; display: none; font-weight: 500;
    position: relative; z-index: 1;
  }
  .login-footer-text {
    font-size: 9px; color: rgba(255,255,255,0.2);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-top: 40px;
    text-align: center;
    z-index: 1;
  }
  /* --- LOGIN + NAV MOBILE RESPONSIVE --- */
  @media (max-width: 640px) {
    .nav-brand img { height: 24px !important; }
    .nav-brand { font-size: 11px; gap: 6px; }
    .nav-sep { font-size: 14px; }
    .nav-calibrate { font-size: 11px; letter-spacing: 1px; }
    .login-card {
      max-width: 320px;
      padding: 32px 28px;
      border-radius: 14px;
    }
    .login-card h2 {
      font-size: 1.6rem;
    }
    .login-card .login-sub {
      font-size: 0.65rem;
      margin-bottom: 22px;
    }
    .login-input-group {
      padding: 0 14px;
    }
    .login-input-group input {
      padding: 10px 0;
      font-size: 13px;
    }
    .login-card .login-btn {
      padding: 11px;
      font-size: 0.8rem;
    }
    .login-footer-text {
      margin-top: 28px;
      font-size: 8px;
    }
  }
</style>
</head>

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin(e) {
  e.preventDefault();
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const [hu, hp] = await Promise.all([sha256(u), sha256(p)]);
  if (hu === AUTH_HASH_U && hp === AUTH_HASH_P) {
    sessionStorage.setItem('calibrate_auth', '1');
    unlockReport(true);
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
}

function unlockReport(fromLogin) {

}

function checkAuth() {
  if (sessionStorage.getItem('calibrate_auth') === '1') {
    unlockReport();
    return true;
  }
  document.querySelector('.nav').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  return false;
}

rata kelompok.\n\nTapi yang membuat profil Anda menarik bukan angkanya — melainkan bagaimana refleksi Anda menambah depth. Saat ditanya apa yang ingin diubah dari hiring, jawaban Anda singkat tapi bermakna: \"Faktor X.\" Ini menunjukkan Anda sudah melampaui checklist teknis dan mencari sesuatu yang lebih intangible dalam proses seleksi.\n\nDi sisi onboarding, Anda sangat artikulatif: \"pengenalan lingkungan, budaya dan value perusahaan, role clarity, dan buddy system\" — ini bukan jawaban generik, ini blueprint yang spesifik. Dan untuk succession, Anda menggambarkan tantangan dengan detail: \"critical person atau superstar yang harus diidentifikasi,\" \"posisi manager yang tidak mempersiapkan second hand,\" sampai ke \"kepala produksi dan PPIC, penjualan sales atau marketing.\"\n\nTakeaway Anda — \"membuat succession plan yang lebih terintegrasi\" — merefleksikan kesadaran bahwa meski semua dimensi sudah kuat, koneksi antar dimensi-lah yang akan membawa Gajah Tunggal ke level berikutnya. Menariknya, dua rekan Anda dari Gajah Tunggal (Yuventinus dan Christy) juga menyebutkan succession dan integrasi sebagai tema utama — ini sinyal bahwa ini isu organisasional, bukan individual.", "rc_insight": "[Hiring Fix] Faktor X.\n[New Hire Challenges] Onboarding process — pengenalan lingkungan, budaya dan value perusahaan, role clarity, dan buddy system.\n[Key Succession Positions] Orang-orang yang berperan secara strategis. Critical person atau superstar. Harus diidentifikasi critical function dan superstarnya. Posisi manager terutama yang tidak mempersiapkan second hand. Ke...\n[Key Takeaway] Membuat succession plan yang lebih terintegrasi.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK PAK INTUS\n\nDengan profil seimbang 4/4/4/4/4 dan posisi sebagai Head of HR Operation, Anda dalam posisi unik: fondasi sudah kuat di semua area, tantangannya adalah mendorong dari Proactive ke Optimized.\n\nPRIORITAS 1: Succession Planning — Dari Diskusi ke Dokumen\nAnda sudah mengidentifikasi siapa yang kritis: \"critical person atau superstar,\" manager yang tidak siapkan second hand, kepala produksi, PPIC, sales/marketing. Ini daftar yang sudah sangat konkret. Yang belum ada adalah formalisasi — per posisi kritis, siapa \"ready now\" dan siapa \"ready in 12 months\"? Dan apakah orang-orang itu tahu bahwa organisasi invest di mereka? Dengan skor Succession 4/5 (di atas rata-rata 2.79), Anda sudah jauh di depan kebanyakan peserta — tinggal dituliskan dan dikomunikasikan.\n\nRekan Anda Yuventinus dan Christy juga menyebutkan peran sales, SCM, production, dan peran strategis sebagai posisi kritis yang sama. Ini bukan kebetulan — ini alignment yang bisa dimanfaatkan untuk membuat succession plan bersama.\n\nAREA KEDUA: \"Faktor X\" dalam Hiring\nJawaban Anda soal hiring — \"Faktor X\" — singkat tapi powerful. Ini menunjukkan Anda mencari sesuatu di luar technical competency. Pertanyaannya: apakah \"Faktor X\" itu sudah terdefinisi sehingga bisa dikomunikasikan ke hiring manager lain? Atau masih menjadi intuisi personal? Mendefinisikan dan menstandarkan \"Faktor X\" bisa jadi differentiator besar.\n\nKEKUATAN YANG BISA DILEVERAGE:\nBlueprint onboarding Anda sudah sangat jelas — pengenalan lingkungan, budaya, value, role clarity, buddy system. Ini bisa jadi model standar yang didokumentasikan dan direplikasi. Apakah semua hiring manager di Gajah Tunggal mengikuti standar yang sama?\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Formalisasi daftar posisi kritis yang sudah Anda identifikasi — buat \"succession one-pager\" per posisi dengan nama candidate dan gap analysis\n2. Dalam 90 hari: Definisikan \"Faktor X\" secara tertulis — buat rubrik yang bisa digunakan interviewer lain, bukan hanya Anda\n3. Dalam 6 bulan: Bersama Yuventinus dan Christy, buat unified succession roadmap untuk Gajah Tunggal yang mencakup semua posisi kritis yang disebutkan tim HR\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Substantial (4/5)"}, {"id": 2, "nama": "Yuventinus Sniarto", "perusahaan": "Gajah Tunggal", "jabatan": "Training Section Head", "meja": "Table 1", "pic_table": "Kevin R", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1": 3, "q2": 4, "q3": 3, "q4": 4, "q5": 3}, "total": 17, "band": "Proactive", "area_terkuat": "Data-Driven Talent", "area_prioritas": "Hiring Effectiveness", "gap": 1, "gap_text": "Relatif seimbang", "integration_text": "Fondasi integrasi data sudah cukup kuat", "benchmark": {"vs_q1": "below", "vs_q2": "at", "vs_q3": "at", "vs_q4": "at", "vs_q5": "below", "vs_total": "below"}, "expert_bands": {"hiring": "Developing", "activation": "Proactive", "succession": "Developing", "data_integration": "Proactive"}, "bd_notes": null, "rc_notes": "RC1: Konfirmasi untuk kandidat yang tidak lanjut proses.\nRC2: Tidak bisa menyatu dengan culture perusahaan.\nRC3: Peran sales, SCM, dan production. Semuanya mengkerucut ke central manager.\nRC4: Pentingnya memperhatikan proses rekrut di awal hingga karyawan pertama perlu di-maintenance sehingga menjaga talent stay, performance, happy to work.", "diagnostic_summary": "Pak Yuventinus, sebagai Training Section Head di Gajah Tunggal, skor diagnostik Anda 17/25 menempatkan organisasi di level Proactive. Profil Anda relatif seimbang (gap hanya 1 poin), dengan kekuatan di Activation dan Data (masing-masing 4/5) dan area yang sedikit lebih rendah di Hiring dan Integration (masing-masing 3/5).\n\nPattern ini logis untuk seorang Training Section Head: Anda melihat kekuatan di area yang paling dekat dengan domain Anda — bagaimana orang diaktivasi dan dikembangkan setelah masuk — sementara area di \"ujung lain\" lifecycle (hiring di awal, integration di akhir) terasa sedikit kurang terkontrol.\n\nRefleksi Anda mengungkap concern yang sangat spesifik. Soal hiring, Anda menyebutkan \"konfirmasi untuk kandidat yang tidak lanjut proses\" — ini detail operasional yang menunjukkan Anda memperhatikan candidate experience, bukan hanya output. Tantangan new hire Anda — \"tidak bisa menyatu dengan culture perusahaan\" — ini tema yang sangat umum di Gajah Tunggal malam ini (rekan Anda Christy juga menyebutkan \"ketidaksesuaian ekspektasi new hire dengan kondisi sebenarnya\").\n\nUntuk succession, Anda menyebutkan \"peran sales, SCM, dan production — semuanya mengkerucut ke central manager.\" Kalimat terakhir ini penting: \"mengkerucut ke central manager\" artinya ada bottleneck struktural di mana terlalu banyak bergantung pada satu titik.\n\nTakeaway Anda merefleksikan pandangan end-to-end: \"pentingnya memperhatikan proses rekrut di awal hingga karyawan pertama perlu di-maintenance sehingga menjaga talent stay, performance, happy to work.\" Ini talent lifecycle thinking yang tepat.", "rc_insight": "[Hiring Fix] Konfirmasi untuk kandidat yang tidak lanjut proses.\n[New Hire Challenges] Tidak bisa menyatu dengan culture perusahaan.\n[Key Succession Positions] Peran sales, SCM, dan production. Semuanya mengkerucut ke central manager.\n[Key Takeaway] Pentingnya memperhatikan proses rekrut di awal hingga karyawan pertama perlu di-maintenance sehingga menjaga talent stay, performance, happy to work.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK PAK YUVENTINUS\n\nSebagai Training Section Head, Anda punya perspektif unik: Anda melihat langsung apa yang terjadi setelah orang masuk organisasi. Rekomendasi ini memanfaatkan vantage point itu.\n\nPRIORITAS 1: Hiring ↔ Training Connection\nAnda menyebutkan tantangan utama new hire: \"tidak bisa menyatu dengan culture perusahaan.\" Sebagai orang yang mengelola training, Anda punya data yang mungkin belum dimanfaatkan: profil peserta training mana yang paling cepat adaptasi culture? Dan apakah insight ini sudah dikomunikasikan balik ke tim hiring? Koneksi data training → hiring recommendation bisa mengubah kualitas rekrutmen dari sumbernya.\n\nConcern Anda tentang \"konfirmasi untuk kandidat yang tidak lanjut proses\" juga menunjukkan sensitivitas terhadap candidate experience — ini penting karena di era digital, pengalaman kandidat yang buruk berdampak ke employer brand.\n\nAREA KEDUA: Succession — Mengatasi Bottleneck Central Manager\nAnda menyebutkan peran sales, SCM, dan production \"semuanya mengkerucut ke central manager.\" Ini red flag struktural: ketika semua alur bergantung pada satu orang, organisasi rentan. Pertanyaannya: apakah central manager itu hanya satu orang, atau pattern ini terjadi di beberapa departemen? Jika sistemik, ini butuh redesign struktur, bukan hanya succession plan.\n\nKEKUATAN YANG BISA DILEVERAGE:\nSkor Activation 4/5 dan posisi Anda di training artinya Anda bisa jadi \"bridge\" antara hiring dan retention. Data dari training (siapa yang berhasil, siapa yang struggle, di mana gap-nya) adalah goldmine yang bisa inform baik hiring criteria maupun succession readiness.\n\nAnda bilang kuncinya adalah \"memperhatikan proses rekrut di awal hingga karyawan pertama perlu di-maintenance\" — ini pandangan lifecycle yang tepat. Dan posisi Anda di training menjadikan Anda connector natural antar proses.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Kumpulkan data dari 2 batch training terakhir — profil peserta mana yang paling berhasil adaptasi culture? Sampaikan insight ini ke tim recruitment Christy\n2. Dalam 90 hari: Bersama Pak Intus, identifikasi apakah bottleneck \"central manager\" terjadi di satu departemen atau sistemik — lalu buat rencana cross-training untuk mengurangi ketergantungan\n3. Dalam 6 bulan: Bangun feedback loop formal: data training outcome → hiring criteria adjustment → mengukur apakah culture fit meningkat\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Substantial (4/5)"}, {"id": 3, "nama": "Christy Agatha Agatha", "perusahaan": "Gajah Tunggal", "jabatan": "Talent Acquisition Section Head", "meja": "Table 1", "pic_table": "Kevin R", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1": 4, "q2": 4, "q3": 4, "q4": 4, "q5": 4}, "total": 20, "band": "Proactive", "area_terkuat": "Lifecycle Integration", "area_prioritas": "Hiring Effectiveness", "gap": 0, "gap_text": "Relatif seimbang", "integration_text": "Fondasi integrasi data sudah cukup kuat", "benchmark": {"vs_q1": "above", "vs_q2": "at", "vs_q3": "above", "vs_q4": "at", "vs_q5": "above", "vs_total": "above"}, "expert_bands": {"hiring": "Proactive", "activation": "Proactive", "succession": "Proactive", "data_integration": "Proactive"}, "bd_notes": null, "rc_notes": "RC1: Less paper pencil. Dan lebih mendigitalisasi beberapa proses recruitment.\nRC2: Ketidaksesuaian ekspektasi new hire dengan kondisi yang sebenarnya di lingkungan.\nRC3: Peran strategis, peran sales, dan peran produksi.\nRC4: Apa yang bisa diulang dalam proses recruitment, onboarding new hires. Dan membuat succession plan yang lebih terintegrasi.", "diagnostic_summary": "Bu Christy, sebagai Talent Acquisition Section Head di Gajah Tunggal, skor diagnostik Anda 20/25 menempatkan organisasi di level Proactive — dengan profil seimbang sempurna: semua dimensi di skor 4, identik dengan rekan Anda Pak Intus. Di antara 34 peserta, profil tanpa gap seperti ini sangat jarang. Semua dimensi Anda di atas rata-rata kelompok.\n\nTapi refleksi Anda menambahkan dimensi yang berbeda dari Pak Intus. Anda menyebutkan hal yang sangat operasional: \"less paper pencil, dan lebih mendigitalisasi beberapa proses recruitment.\" Ini concern yang langsung actionable — dan menunjukkan bahwa bahkan di skor 4/5, Anda masih melihat friction point di proses sehari-hari.\n\nTantangan new hire Anda — \"ketidaksesuaian ekspektasi new hire dengan kondisi yang sebenarnya di lingkungan\" — ini echo yang kuat dari apa yang Yuventinus juga sebutkan (\"tidak bisa menyatu dengan culture\"). Ketika dua orang dari departemen berbeda menyebutkan masalah yang sama, itu bukan anekdot — itu pattern organisasional.\n\nUntuk succession, Anda menyebutkan \"peran strategis, peran sales, dan peran produksi\" — mirip dengan apa yang disebut Intus dan Yuventinus. Tiga orang dari Gajah Tunggal, semua menyebutkan posisi yang serupa. Ini konfirmasi kuat bahwa succession gap ini sudah jelas terlihat di seluruh level HR.\n\nTakeaway Anda juga merangkum seluruh malam ini: \"apa yang bisa diulang dalam proses recruitment, onboarding new hires, dan membuat succession plan yang lebih terintegrasi\" — ini mindset continuous improvement dan integrasi yang persis dibutuhkan di level Proactive.", "rc_insight": "[Hiring Fix] Less paper pencil. Dan lebih mendigitalisasi beberapa proses recruitment.\n[New Hire Challenges] Ketidaksesuaian ekspektasi new hire dengan kondisi yang sebenarnya di lingkungan.\n[Key Succession Positions] Peran strategis, peran sales, dan peran produksi.\n[Key Takeaway] Apa yang bisa diulang dalam proses recruitment, onboarding new hires. Dan membuat succession plan yang lebih terintegrasi.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK BU CHRISTY\n\nSebagai Talent Acquisition Section Head, Anda ada di garda depan talent lifecycle Gajah Tunggal. Dengan skor seimbang 4/4/4/4/4, tantangannya bukan memperbaiki yang lemah, tapi mengoptimalkan sistem yang sudah berjalan.\n\nPRIORITAS 1: Digitalisasi Recruitment Process\nAnda sendiri menyebutkan \"less paper pencil, lebih mendigitalisasi proses recruitment.\" Ini quick win yang berdampak besar: digitalisasi bukan hanya soal efisiensi — tapi soal data. Setiap tahap recruitment yang digital menghasilkan data yang bisa dianalisis: source mana yang menghasilkan hire terbaik? Di tahap mana kandidat paling sering drop? Berapa actual time-to-hire per posisi? Tanpa digitalisasi, jawaban ini hanya tebakan.\n\nAREA KEDUA: Expectation-Reality Alignment\nAnda dan Yuventinus keduanya menyebutkan masalah yang sama: new hire yang tidak cocok dengan kondisi nyata. Ini bukan masalah screening — ini masalah communication pre-hire. Apakah job preview yang realistis sudah menjadi bagian dari proses? Apakah kandidat punya kesempatan melihat environment kerja sebelum accept offer? Research menunjukkan realistic job preview mengurangi early turnover hingga 30%.\n\nKEKUATAN YANG BISA DILEVERAGE:\nDengan tiga orang HR Gajah Tunggal (Anda, Pak Intus, Pak Yuventinus) semua mengidentifikasi succession di posisi yang sama — strategis, sales, produksi — Anda punya alignment yang langka. Kebanyakan organisasi struggle untuk mendapat agreement tentang posisi kritis. Anda sudah punya itu. Tinggal eksekusi bersama.\n\nAnda bilang ingin tahu \"apa yang bisa diulang\" — mindset repeatability ini sangat powerful. Identifikasi satu proses yang sudah berhasil, dokumentasikan, lalu replicate.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Identifikasi 3 tahap recruitment yang masih manual/paper-based, lalu digitalisasi yang paling high-volume terlebih dulu\n2. Dalam 90 hari: Implementasi realistic job preview untuk 2 posisi dengan turnover tertinggi — bisa berupa video singkat tentang daily reality pekerjaan itu\n3. Dalam 6 bulan: Bersama Pak Intus dan Pak Yuventinus, luncurkan unified succession roadmap yang mencakup semua posisi kritis yang diidentifikasi tim Gajah Tunggal\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Substantial (4/5)"}, {"id": 4, "nama": "Eka Damayanti", "perusahaan": "Fast Food Indonesia", "jabatan": "People Development Head", "meja": "Table 1", "pic_table": "Kevin R", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1": 4, "q2": 4, "q3": 3, "q4": 3, "q5": 3}, "total": 17, "band": "Proactive", "area_terkuat": "Performance Activation", "area_prioritas": "Succession Readiness", "gap": 1, "gap_text": "Relatif seimbang", "integration_text": "Proses talent berjalan, tapi data belum terkoneksi", "benchmark": {"vs_q1": "above", "vs_q2": "at", "vs_q3": "at", "vs_q4": "below", "vs_q5": "below", "vs_total": "below"}, "expert_bands": {"hiring": "Proactive", "activation": "Proactive", "succession": "Developing", "data_integration": "Developing"}, "bd_notes": null, "rc_notes": "RC1: Assessment, proses menyaring calon.\nRC2: Relationship building.\nRC3: Supply chain head, GM operasional atau regional head, dan people development manager.\nRC4: Sangat penting menjaga dan mempertahankan orang-orang terbaik. Yang paling penting adalah mempersiapkan pengganti dan menyiapkan talent.", "diagnostic_summary": "Bu Eka, sebagai People Development Head di Fast Food Indonesia, skor diagnostik Anda 17/25 menempatkan organisasi di level Proactive. Kekuatan Anda ada di Hiring dan Activation (masing-masing 4/5), sementara Succession, Data, dan Integration di skor 3. Yang menarik: Integration Indicator Anda menunjukkan \"proses jalan, data belum terkoneksi\" — artinya mekanisme talent sudah ada, tapi belum terhubung oleh data.\n\nDi antara 34 peserta, Hiring dan Activation Anda di atas rata-rata, tapi Data dan Integration di bawah. Ini pattern khas organisasi yang sudah punya proses yang bagus tapi belum memanfaatkan data untuk mengoptimalkannya.\n\nRefleksi Anda memberikan konteks yang sangat bernilai. Untuk hiring, Anda menyebutkan \"assessment, proses menyaring calon\" — singkat tapi menunjukkan sudah ada structured screening. Tantangan new hire Anda cukup unik: \"relationship building.\" Ini tifikasi siapa yang paling dekat? Untuk Supply Chain Head dan GM Operasional — apakah ada internal talent yang sudah menunjukkan readiness? Untuk posisi Anda sendiri — siapa yang Anda develop hari ini yang bisa take over?\n\nAREA KEDUA: Data Connection — Menghubungkan Proses yang Sudah Jalan\nSkor Anda menunjukkan proses sudah ada (Hiring 4, Activation 4) tapi data belum terkoneksi (Data 3, Integration 3). Pertanyaan kunci untuk F&B: dari new hire yang berhasil \"build relationship\" dengan cepat (strength yang Anda cari), apakah ada pattern di profil hiring mereka? Satu koneksi data ini saja bisa mengubah cara Anda screen kandidat.\n\nAnda mention tantangan new hire adalah \"relationship building\" — ini insight yang spesifik ke industri F&B di mana team dynamics dan customer interaction sangat penting. Apakah assessment hiring Anda sudah mengukur kemampuan interpersonal ini secara eksplisit?\n\nKEKUATAN YANG BISA DILEVERAGE:\nHiring dan Activation Anda di 4/5 artinya Anda sudah tahu cara mendapatkan dan mengaktivasi orang yang tepat. Gunakan data dari dua proses ini: profil hire yang paling berhasil + milestone activation yang paling prediktif = kriteria succession yang lebih tajam.\n\nAnda bilang \"yang paling penting adalah mempersiapkan pengganti dan menyiapkan talent\" — dan posisi Anda sebagai People Development Head menjadikan ini bukan hanya tanggung jawab, tapi legacy.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Buat succession one-pager untuk Supply Chain Head, GM Operasional, dan posisi Anda — siapa \"closest candidate\" dan apa gap-nya\n2. Dalam 90 hari: Tambahkan assessment interpersonal/relationship building secara formal di proses hiring untuk posisi customer-facing dan team lead\n3. Dalam 6 bulan: Hubungkan data hiring assessment dengan 12-month performance — satu koneksi ini bisa mengubah kualitas keputusan talent di seluruh Fast Food Indonesia\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanp . Yang berharga adalah people. Step pertama perubahan adalah awareness.\"", "rc_insight": "[Hiring Fix] Subjektivitas dari penilaian user. Terkadang satu posisi bisa sangat berbeda penilaian dan kriterianya. Dan efek subjektivitas pasti selalu ada. Tapi bagaimana meminimalisir hal itu?\n[New Hire Challenges] Onboarding yang tidak berjalan dengan baik. Tidak ada support yang maksimal dari tim atasan. Coach leader — leader itu harus menjadi coach, tim akan jalan dan dia tahu kalau dia sepenting itu.\n[Key Succession Positions] Head of Talent Acquisition, National Distribution Manager, dan HR Director.\n[Key Takeaway] Dalam perusahaan tidak semua hal berbicara tentang pekerjaan, tapi yang paling penting adalah people. Yang berharga adalah people. Step pertama perubahan adalah awareness.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK BU ADHEL\n\nSebagai TA Team member, Anda punya perspektif yang paling dekat dengan proses hiring sehari-hari. Refleksi Anda menunjukkan Anda bukan hanya executor — Anda observer yang tajam dan thinker yang dalam.\n\nPRIORITAS 1: Mengurangi Subjektivitas Hiring\nPertanyaan Anda sangat tepat: \"bagaimana meminimalisir subjektivitas?\" Jawabannya: structured interview. Buat rubrik scoring per posisi yang disepakati bersama hiring manager SEBELUM interview dimulai. Ini tidak menghilangkan subjektivitas sepenuhnya — tapi memastikan semua interviewer menilai dengan lensa yang sama. Anda sudah aware masalahnya — \"satu posisi bisa sangat berbeda penilaian dan kriterianya\" — rubrik yang konsisten mengatasi ini.\n\nSicilia (Head of TA, atasan Anda) punya skor Integration 5/5 dan Data 4/5 — leverage dukungannya untuk membangun rubrik yang data-driven. Ini bisa jadi collaborative project yang memperkuat kerja tim.\n\nAREA KEDUA: Leader as Coach — Dari Insight ke Program\nInsight Anda tentang \"leader itu harus menjadi coach\" adalah diagnosa yang sangat tepat tentang mengapa onboarding gagal. Masalahnya bukan di proses — tapi di people yang menjalankan proses. Hiring manager yang tidak menjadi coach untuk new hire mereka adalah bottleneck tersembunyi. Pertanyaannya: apakah ini bisa menjadi program formal? \"Manager as First Coach\" training untuk setiap atasan yang akan menerima new hire?\n\nAnda dan Sicilia keduanya menyebutkan bahwa support dari tim/atasan minim — ini bukan anekdot, ini data. Solusinya perlu structural: buat onboarding accountability untuk hiring manager, bukan hanya untuk TA.\n\nKEKUATAN YANG BISA DILEVERAGE:\nAnda bilang \"step pertama perubahan adalah awareness\" — dan awareness Anda sudah sangat tinggi. Anda melihat subjektivitas di hiring, leadership gap di onboarding, dan pentingnya people di setiap tahap. Yang dibutuhkan sekarang: translate awareness menjadi proposals yang bisa Anda bawa ke Sicilia dan ke leadership.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Bersama Sicilia, buat structured interview rubrik untuk 3 posisi yang paling sering direkrut — standarisasi kriteria dan scoring yang disepakati semua interviewer\n2. Dalam 90 hari: Propose \"Manager as First Coach\" initiative — 1-jam orientation untuk setiap hiring manager sebelum new hire mereka masuk, mencakup: apa yang diharapkan di 30 hari pertama, bagaimana menjadi coach, dan check-in schedule\n3. Dalam 6 bulan: Bersama Edwin (HRIS), tracking apakah new hire yang diterima oleh manager yang sudah ikut coaching program memiliki retention dan performance yang lebih baik\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Substantial (4/5)"}, {"id": 28, "nama": "Edwin", "perusahaan": "Wings Group", "jabatan": "HRIS Division Head", "meja": "Table 4", "pic_table": "Pamkin", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1 h tema yang juga diangkat oleh rekan Anda di TelkomMetra, mengindikasikan ini isu organisasional, bukan individual.\n\nDari diskusi di meja Anda, BD host mencatat concern tentang \"user unfit beda — user skala staff gak cocok culture\" — ini memperkuat bahwa culture fit assessment perlu jadi bagian formal dari proses. Takeaway Anda — \"talent life cycle integration adalah hal penting dalam pengelolaan new hire\" — menunjukkan Anda sudah melihat big picture yang tepat.", "rc_insight": "[Hiring Fix] Memperbanyak source atau bank data, tidak dibatasi dan juga diizinkan open recruitment.\n[New Hire Challenges] Karakter atau attitude new hire yang tidak bisa membaur atau fit.\n[Key Succession Positions] SVP ANA. VP Legal dan Corporation. VP MC/GA.\n[Key Takeaway] Talent life cycle integration adalah hal penting dalam pengelolaan new hire.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK BU SRI THOMASAYU\n\nDengan skor 20/25 dan Hiring di level Optimized (5/5), Anda sudah di posisi yang sangat kuat. Rekomendasi ini bukan tentang memperbaiki yang rusak — tapi tentang menutup gap terakhir agar seluruh talent lifecycle benar-benar terintegrasi.\n\nPRIORITAS 1: Succession Readiness\nAnda menyebutkan SVP ANA, VP Legal dan Corporation, dan VP MC/GA sebagai tiga posisi kritis tanpa pengganti jelas. Menariknya, rekan Anda di TelkomMetra (Bu Fahima) juga menyebutkan posisi serupa — SVP SPAA, VP Legal, VP HC. Ini menunjukkan ini bukan blind spot personal, tapi organizational gap yang perlu diaddress secara sistemik. Dengan skor 3/5, Anda sudah punya diskusi dan awareness — yang perlu diformalkan adalah: per posisi, siapa \"ready now\" dan siapa \"ready in 12 months\"? Dan yang paling penting: apakah mereka tahu?\n\nDari diskusi meja Anda, concern tentang \"user skala staff yang tidak cocok culture\" menambah dimensi lain: succession bukan hanya soal skill readiness, tapi juga culture carrier. Apakah successor yang Anda identifikasi juga akan membawa culture yang Anda inginkan?\n\nAREA KEDUA: Hiring Pipeline Expansion\nAnda sendiri menyebutkan ingin \"memperbanyak source atau bank data\" dan membuka open recruitment. Di level Hiring 5/5, ini evolusi natural — dari proses yang sudah kuat ke pipeline yang lebih proaktif. Pertanyaannya bukan lagi \"bagaimana kita hire yang tepat\" tapi \"dari mana talent pool 12-18 bulan ke depan?\"\n\nKEKUATAN YANG BISA DILEVERAGE:\nHiring Effectiveness Anda di 5/5 artinya Anda sudah tahu profil orang yang berhasil di organisasi Anda. Gunakan data historis itu untuk inform succession — pattern apa yang menunjukkan seseorang ready untuk naik? Profil seperti apa yang sukses melewati transisi dari contributor ke leader?\n\nAnda bilang \"talent life cycle integration adalah hal penting\" — dan memang, koneksi hiring → performance → succession adalah missing link yang bisa membuat skor 20 Anda menjadi 23-25.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Untuk SVP ANA, VP Legal & Corp, dan VP MC/GA — identifikasi 1-2 succession candidates per posisi, sekaligus koordinasi dengan Bu Fahima untuk posisi yang overlap (VP Legal)\n2. Dalam 90 hari: Buat profil \"ideal successor\" berbasis data hiring historis — orang seperti apa yang berhasil naik di TelkomMetra? Gunakan ini sebagai development benchmark\n3. Dalam 6 bulan: Implement culture fit assessment formal di proses hiring untuk mengatasi isu \"attitude/karakter yang tidak bisa membaur\" — buat kriteria tertulis, bukan hanya gut feeling\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Complete (5/5)"}, {"id": 45, "nama": "Margana Mohammad", "perusahaan": "Staffinc", "jabatan": "CCO", "meja": "Table 6", "pic_table": "Tiwi", "attended": "Yes", "diagnostic_filled": "Yes", "scor ght interview.\nRC2: Disiplin dan performa kerja yang berhubungan dengan laut tinggi.\nRC3: GM operasional, SPV trainer, GM pembangunan.\nRC4: Good leadership untuk mengurangi turnover.", "diagnostic_summary": "Bu Echi, sebagai HR Manager di Hachi Group, skor diagnostik Anda 20/25 menempatkan organisasi di level Proactive dengan profil yang sangat merata — semua dimensi di skor 4, tanpa gap sama sekali. Ini profil yang jarang: di antara 34 peserta, hanya beberapa yang punya keseimbangan seperti ini. Semua dimensi Anda di atas rata-rata kelompok.\n\nTapi angka saja tidak menceritakan seluruh gambaran. Dari diskusi di meja Anda, realitas operasional Hachi Group sangat unik: walk-in interview 700-1.000 kandidat per hari, proses seleksi lengkap (tes matematika dasar, mekanik, potensi, user interview, OJT simulation) yang selesai dalam satu hari. Volume ini luar biasa — dan pain signal utamanya jelas: high turnover rate. Anda sendiri mengkonfirmasi ini di refleksi: \"mengurangi turnover ketika telah di-hire atau pada saat awal di-hire dan training.\"\n\nYang menarik dari diskusi meja Anda: Bu Githa percaya tes matematika dasar adalah fondasi untuk menetapkan career path seseorang, bahkan untuk OB sekalipun. Ini menunjukkan filosofi hiring yang sudah data-informed, meski diterapkan di high-volume context.\n\nUntuk succession, BD host mencatat tiga role kritis: GM Pembangunan (yang disebut sebagai \"walking bible\" dari arsitektur gedung sampai operasional dapur), Regional Operations Manager, dan Trainer. GM Pembangunan jelas yang paling berisiko — ketika satu orang menjadi walking bible, itu bukan kekuatan, itu single point of failure. Refleksi Anda juga menyebutkan posisi yang sama: GM operasional, SPV trainer, GM pembangunan.\n\nTakeaway Anda — \"good leadership untuk mengurangi turnover\" — tepat, karena di volume operasi Hachi, leadership quality di level supervisor langsung adalah multiplier terbesar.", "rc_insight": "[Hiring Fix] Mengurangi turnover ketika telah di-hire atau pada saat awal di-hire dan training. How to do the right interview.\n[New Hire Challenges] Disiplin dan performa kerja yang berhubungan dengan laut tinggi.\n[Key Succession Positions] GM operasional, SPV trainer, GM pembangunan.\n[Key Takeaway] Good leadership untuk mengurangi turnover.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK BU ECHI\n\nDengan profil seimbang 4/4/4/4/4 dan konteks operasional Hachi Group yang high-volume, rekomendasi ini difokuskan pada leverage — bagaimana fondasi yang sudah kuat bisa mengatasi pain point terbesar Anda: turnover.\n\nPRIORITAS 1: Hiring → Activation Connection (Mengatasi Turnover)\nAnda memproses 700-1.000 kandidat walk-in per hari dengan seleksi lengkap dalam satu hari. Volume ini impressive, tapi juga berarti margin of error kecil. Anda menyebutkan tantangan \"disiplin dan performa kerja\" di new hire — ini sering kali bukan masalah seleksi yang salah, tapi transisi yang terlalu cepat dari candidate ke employee tanpa buffer yang cukup. Pertanyaan kunci: dari 1.000 yang datang, berapa yang masih aktif di hari ke-30? Ke-90? Data ini — yang mungkin belum dilacak secara sistematis — bisa mengubah cara Anda mendesain onboarding.\n\nBD host mencatat Anda baru saja dari walk-in interview di Cakung sebelum acara, dan tetap berusaha engage diskusi meski kelelahan. Ini menunjukkan dedikasi — tapi juga realitas bahwa operasional hiring di Hachi sangat demanding. Investasi di proses yang mengurangi rework (turnover = rework) akan membebaskan bandwidth Anda.\n\nAREA KEDUA: Succession — Mengatasi Single Point of Failure\nGM Pembangunan yang menjadi \"walking bible\" adalah risiko terbesar Anda. Ketika semua pengetahuan ada di satu kepala, organisasi rentan. Mulai dari knowledge capture: apa 10 keputusan paling kritis yang hanya GM Pembangunan bisa buat? Dokumentasikan, lalu identifikasi siapa yang bisa mulai belajar.\n\nKEKUATAN YANG BISA DILEVERAGE:\nProfil seimbang Anda artinya tidak ada area yang \"rusak\" — ini jarang. Filosofi testing yang sudah ada (tes matematika sebagai predictor career path) bisa diperluas: apakah ada korelasi antara skor tes masuk dan retention 90 hari? Jika ya, Anda sudah punya predictive tool tanpa sadar.\n\nAnda bilang \"good leadership untuk mengurangi turnover\" — dan memang, di skala operasi Hachi, investasi di leadership capability supervisor akan punya multiplier effect terbesar.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Track retention data per cohort walk-in interview (hari ke-7, 30, 90) — identifikasi di titik mana turnover paling tinggi terjadi\n2. Dalam 90 hari: Mulai knowledge transfer dari GM Pembangunan — dokumentasikan 10 keputusan kritis dan mulai cross-train 1-2 orang\n3. Dalam 6 bulan: Analisis korelasi skor seleksi masuk vs retention — jika ada pattern, gunakan untuk refine kriteria seleksi dan kurangi \"bad hire\" dari awal\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Complete (5/5)"}, {"id": 50, "nama": "Sulaiha", "perusahaan": "Karyamas Plantation", "jabatan": "TAD Manager", "meja": "Table 7", "pic_table": "Olyv", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1": 3, "q2": 3, "q3": 3, "q4": 4, "q5": 2}, "total": 15, "band": "Developing", "area_terkuat": "Data-Driven Talent", "area_prioritas": "Lifecycle Integration", "gap": 2, "gap_text": "Ada perbedaan antar area", "integration_text": "Fondasi integrasi data sudah cukup kuat", "benchmark": {"vs_q1": "below", "vs_q2": "below", "vs_q3": "at", "vs_q4": "at", "vs_q5": "below", "vs_total": "below"}, "expert_bands": {"hiring": "Developing", "activation": "Developing", "succession": "Developing", "data_integration": "Developing"}, "bd_notes": "[BD: Olive | Table 7 | Interest: Ho on (2/5) menjadi gap terbesar. Ini pattern yang menarik untuk perusahaan plantation: data soal talent mungkin sudah ada, tapi belum terhubung antar proses.\n\nDari diskusi di meja Anda, gambaran menjadi lebih jelas. Karyamas menumbuhkan talent lewat MT Program — 2 batch per tahun, 40 orang per batch, disaring dari 4.000 pelamar. Ini rasio seleksi 2% yang sangat ketat. Tapi BD host mencatat pain signal utama: \"people left because of the bosses.\" Dan di sesi Activation, Anda menguraikan lebih detail — supervisor punya ekspektasi yang makin tinggi seiring perusahaan berkembang, tapi ekspektasi itu tidak tercantum di roles & responsibilities bawahan, dan tidak ada komunikasi dua arah. \"Supervisor merasa bawahannya sudah paham, bawahan merasa apa yang dikerjakan di luar R&R mereka.\"\n\nRefleksi Anda mengkonfirmasi ini: tantangan terbesar new hire adalah \"ketidakjelasan peran yang diharapkan oleh organisasi.\" Dan untuk succession, Anda menyebutkan MD, Director Finance, dan Agronomy Excellence — menariknya, dari diskusi meja, succession untuk Agronomy Excellence terjadi secara lateral (dari peer), bukan vertikal, karena kecocokan background dan minat.\n\nTakeaway Anda — \"integrasi fungsi-fungsi HC menjadi kunci keberhasilan perusahaan dalam mengelola talent secara menyeluruh\" — persis merefleksikan gap terbesar di skor Anda: Integration di 2/5. Anda sudah melihat masalahnya.", "rc_insight": "[Hiring Fix] Meningkatkan integrasi antara business purpose dan journey dengan proses penyusunan workforce planning.\n[New Hire Challenges] Ketidakjelasan peran yang diharapkan oleh organisasi ke new hire.\n[Key Succession Positions] MD, Director Finance, AE.\n[Key Takeaway] Integrasi fungsi-fungsi HC menjadi kunci keberhasilan perusahaan dalam mengelola talent secara menyeluruh.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named, personal takeaway captured. (4/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK BU SULAIHA\n\nProfil Anda menunjukkan organisasi yang sudah punya data dan proses seleksi yang kuat (rasio 4.000 → 80 peserta MT), tapi koneksi antar proses talent masih terputus-putus. Kabar baiknya: fondasi data sudah ada, tinggal disambungkan.\n\nPRIORITAS 1: Lifecycle Integration — Menyambungkan yang Terputus\nAnda sendiri menyebutkan ini sebagai takeaway utama: \"integrasi fungsi-fungsi HC menjadi kunci keberhasilan.\" Dan dari diskusi meja Anda, akar masalahnya terlihat jelas: communication gap antara atasan dan bawahan. Supervisor punya ekspektasi yang tidak tertulis, bawahan merasa bekerja di luar R&R mereka. Ini bukan masalah orang — ini masalah sistem yang belum terhubung. Hiring menghasilkan orang yang tepat (rasio seleksi 2% membuktikan itu), tapi apa yang terjadi setelahnya tidak terkoneksi ke ekspektasi dan development.\n\nBD host juga mencatat bahwa Anda terbuka untuk ditemui di kantor di Cikini dan ingin berkonsultasi lebih lanjut — ini menunjukkan urgency yang nyata untuk menyelesaikan gap ini.\n\nAREA KEDUA: Performance Activation — Communication Gap\n\"People left because of the bosses\" — kalimat dari diskusi meja Anda yang sangat telling. Dan detail yang Anda berikan di sesi Activation menguraikan mekanismenya: ekspektasi yang berubah seiring perusahaan berkembang, tapi tidak dikomunikasikan. Biasanya ketahuan di bulan ke-3 — terlalu lambat. Langkah pertama: pastikan setiap supervisor punya conversation terstruktur di hari ke-7, 30, dan 90 dengan new hire tentang ekspektasi — bukan hanya performance review, tapi alignment check.\n\nKEKUATAN YANG BISA DILEVERAGE:\nSkor Data-Driven Talent di 4/5 dan proses MT Program yang sudah terstruktur adalah aset besar. Anda sudah punya data seleksi yang kuat — sekarang hubungkan dengan data retention: dari 80 orang per tahun yang lolos MT, berapa yang masih aktif setelah 12 bulan? Profil mana yang paling berhasil? Jawaban ini bisa mengubah cara Anda mendesain onboarding dan supervisory support.\n\nSoal succession, pendekatan lateral untuk Agronomy Excellence (dari peer, bukan bawahan) sebenarnya inovatif — ini bisa jadi model untuk posisi lain yang butuh deep expertise.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Tulis roles & responsibilities yang updated untuk 5 posisi dengan turnover tertinggi — pastikan ekspektasi tertulis, bukan asumsi\n2. Dalam 90 hari: Implementasi check-in terstruktur supervisor-new hire di hari 7/30/90 — fokus pada alignment ekspektasi, bukan performance review\n3. Dalam 6 bulan: Hubungkan data MT Program (profil masuk) dengan data retention 12 bulan — satu koneksi data ini saja sudah bisa mengubah kualitas keputusan hiring Anda\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Complete (5/5)"}, {"id": 51, "nama": "Renata Catur", "perusahaan": "Propan Group", "jabatan": "CHRO", "meja": "Table 7", "pic_table": "Olyv", "attended": "No", "diagnostic_filled": "No", "scores": null, "total": null, "band": null, "area_terkuat": null, "area_prioritas": null, "gap": null, "gap_text": null, "integration_text": null, "benchmark": null, "expert_bands": null, "bd_notes": null, "rc_notes": null, "diagnostic_summary": null, "rc_insight": null, "personalized_recommendation": null, "data_completeness": "No Data"}, {"id": 52, "nama": "Dimas P Putra", "perusahaan": "Staffinc", "jabatan": "COO", "meja": "Table 7", "pic_table": "Olyv", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1": 3, "q2": 5, "q3": 3, "q4": 4, "q5": 4}, "total": 19, "band": "Proactive", "area_terkuat": "Performance Activation", "area_prioritas": "Hiring Effectiveness", "gap": 2, "gap_text": "Ada perbedaan antar area", "integration_text": "Fondasi integrasi data sudah cukup kuat", "benchmark": {"vs_q1": "below", "vs_q2": "above", "vs_q3": "at", "vs_q4": "at", "vs_q5": "above", "vs_total": "above"}, "expert_bands": {"hiring": "Developin \n\nPRIORITAS 1: Facilitating C-Level Talent Alignment\nIni prioritas yang unik untuk Anda: sebagai COO, Anda ada di posisi tengah antara CEO (Wisnu) dan CCO (Margana) yang melihat succession secara bertolak belakang (1/5 vs 5/5). Skor Anda 3/5 — moderate, di tengah-tengah. Ini menjadikan Anda facilitator natural untuk conversation ini.\n\nPertanyaan yang perlu dijawab bersama: apakah succession readiness memang berbeda per fungsi (commercial vs finance vs operations)? Jika ya, mana yang paling urgent? Jika tidak, mengapa persepsi berbeda? Jawaban apapun menghasilkan action plan yang berguna.\n\nAREA KEDUA: Hiring → Activation Connection\nDengan Activation 5/5 dan Hiring 3/5, ada opportunity: apa yang membuat activation berhasil di Staffinc? Dan apakah insight dari activation (profil orang yang paling cepat perform) sudah digunakan untuk inform hiring criteria? Sebagai COO yang melihat operational performance langsung, Anda punya data yang mungkin belum ditranslate ke hiring process.\n\nWisnu menyebutkan \"clear expectations\" sebagai tantangan new hire — dan dari posisi COO, Anda yang paling bisa memastikan expectations operasional terdefinisi dengan jelas sebelum day one.\n\nKEKUATAN YANG BISA DILEVERAGE:\nSkor 19/25 (tertinggi di trio Staffinc) dengan Activation 5/5 menunjukkan bahwa area yang paling dekat dengan operasional sudah sangat kuat. Ini bisa menjadi model: apa yang membuat activation berhasil di operasional bisa direplikasi ke dimensi lain.\n\nAnda keluar dari acara karena meeting — realita COO. Tapi diagnostik yang Anda isi memberikan data yang sangat penting untuk konteks Staffinc secara keseluruhan.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Fasilitasi talent alignment session dengan Wisnu dan Margana — gunakan skor CALIBRATE sebagai starting point, fokus di gap Succession (1 vs 3 vs 5)\n2. Dalam 90 hari: Dokumentasikan apa yang membuat activation berhasil di operasional (Anda skor 5) — proses apa, milestone apa, support apa — lalu sampaikan ke hiring t : "below", "vs_q4": "below", "vs_q5": "below", "vs_total": "below"}, "expert_bands": {"hiring": "Proactive", "activation": "Developing", "succession": "Reactive", "data_integration": "Developing"}, "bd_notes": null, "rc_notes": "RC1: Saya membutuhkan para hiring manager memahami kebutuhannya dan mengetahui cara untuk melakukan interview yg tepat kepada kandidat.\nRC2: Ekspektasi dr atasan tidak secara jelas disampaikan dan adanya stakeholders lainnya yg tidak dilibatkan dalam proses integrasi.\nRC3: Walaupun sdh disiapkan succession tetapi gap yg harus di isi antara Sr position dan layer dibawahnya masih mempunyai jarak dan membutuhkan waktu untuk dapat di isi.", "diagnostic_summary": "Pak Djalu, sebagai Head of HC di Draeger Indonesia, skor diagnostik Anda 15/25 menempatkan organisasi di level Developing. Kekuatan utama di Hiring (4/5, di atas rata-rata), sementara Succession paling rendah di 2/5 (di bawah rata-rata). Activation, Data, dan Integration masing-masing 3 — menunjukkan empat dimensi non-hiring masih dalam tahap pengembangan.\n\nYang membuat refleksi Anda sangat bernilai adalah kedalaman dan kejujurannya. Soal hiring: \"saya membutuhkan para hiring manager memahami kebutuhannya dan mengetahui cara untuk melakukan interview yang tepat kepada kandidat.\" Ini bukan tentang proses TA yang lemah — ini tentang capability hiring manager yang belum memadai. Anda melihat bahwa bottleneck bukan di pintu gerbang HR, tapi di user yang melakukan interview.\n\nTantangan new hire Anda menambah layer: \"ekspektasi dari atasan tidak secara jelas disampaikan dan adanya stakeholders lainnya yang tidak dilibatkan dalam proses integrasi.\" Dua masalah sekaligus — clarity dan inclusivity. New hire tidak hanya kurang tahu apa yang diharapkan, tapi juga stakeholder yang seharusnya terlibat tidak ada di meja.\n\nUntuk succession, jawaban Anda sangat nuanced: \"walaupun sudah disiapkan succession tetapi gap yang harus diisi antara senior position dan layer di bawahnya masih mempunyai jarak dan membutuhkan waktu.\" Ini bukan tentang tidak ada plan — Anda sudah punya. Masalahnya adalah readiness gap yang terlalu besar. Ini tantangan yang berbeda dari kebanyakan peserta yang bahkan belum mulai.\n\nDi Draeger Indonesia yang merupakan perusahaan multinasional, tantangan succession bisa lebih kompleks karena ada layer global vs lokal.", "rc_insight": "[Hiring Fix] Saya membutuhkan para hiring manager memahami kebutuhannya dan mengetahui cara untuk melakukan interview yg tepat kepada kandidat.\n[New Hire Challenges] Ekspektasi dr atasan tidak secara jelas disampaikan dan adanya stakeholders lainnya yg tidak dilibatkan dalam proses integrasi.\n[Key Succession Positions] Walaupun sdh disiapkan succession tetapi gap yg harus di isi antara Sr position dan layer dibawahnya masih mempunyai jarak dan membutuhkan waktu untuk dapat di isi.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named. (3/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK PAK DJALU\n\nSebagai Head of HC di perusahaan multinasional, tantangan Anda memiliki layer kompleksitas tambahan. Rekomendasi ini fokus pada apa yang paling bisa Anda influence di level lokal.\n\nPRIORITAS 1: Hiring Manager Capability Building\nAnda mengartikulasikan masalah dengan sangat jelas: hiring manager perlu \"memahami kebutuhannya dan mengetahui cara interview yang tepat.\" Ini bukan training generik — ini tentang dua skill spesifik: (1) mendefinisikan kebutuhan secara presisi sebelum rekrutmen dimulai, dan (2) melakukan interview yang terstruktur dan evidence-based. Kedua skill ini bisa di-address dengan program yang sangat targeted.\n\nTantangan new hire — \"ekspektasi tidak jelas\" dan \"stakeholders tidak dilibatkan\" — sebenarnya berakar dari masalah yang sama: hiring manager yang tidak fully prepared. Jika manager bisa mengartikulasikan kebutuhan dengan jelas di awal, ekspektasi ke new hire juga akan lebih jelas.\n\nAREA KEDUA: Succession — Memperkecil Readiness Gap\nAnda dalam posisi unik di antara peserta CALIBRATE: Anda SUDAH punya succession plan. Masalahnya bukan absence of plan, tapi \"gap antara senior position dan layer di bawahnya yang masih mempunyai jarak.\" Ini masalah development acceleration, bukan planning.\n\nPertanyaan kunci: untuk posisi-posisi yang sudah ada successor-nya, apa top 3 gap yang paling sering muncul? Apakah technical expertise? Leadership breadth? Cross-functional exposure? Identifikasi pattern-nya, lalu desain accelerated development program yang targeted ke gap tersebut.\n\nKEKUATAN YANG BISA DILEVERAGE:\nHiring 4/5 menunjukkan fondasi recruitment sudah cukup baik dari sisi TA. Dan fakta bahwa Anda sudah punya succession plan (meski gap masih besar) menempatkan Anda di depan kebanyakan peserta. Fondasi ini bisa diperkuat, bukan dibangun ulang.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Desain \"Interview Excellence\" workshop untuk 5-10 hiring manager yang paling sering merekrut — fokus pada need definition dan structured interview technique\n2. Dalam 90 hari: Untuk setiap posisi di succession plan, identifikasi top 3 readiness gap dari successor yang sudah dipetakan — buat individual development plan dengan milestone quarterly\n3. Dalam 6 bulan: Implementasi stakeholder mapping untuk setiap new hire — pastikan semua stakeholder yang relevan terlibat di proses integrasi, bukan hanya direct manager\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Substantial (4/5)"}, {"id": 56, "nama": "Taufan", "perusahaan": "PT Dahana", "jabatan": null, "meja": "Table 8", "pic_table": "Fakhri", "attended": "Yes", "diagnostic_filled": "Yes", "scores": {"q1": 3, "q2": 4, "q3": 3, "q4": 4, "q5": 3}, "total": 17, "band": "Proactive", "area_terkuat": "Data-Driven Talent", "area_prioritas": "Hiring Effectiveness", "gap": 1, "gap_text": "Relatif seimbang", "integration_text": "Fondasi integrasi data sudah cukup kuat", "benchmark": {"vs_q1": "below", "vs_q2": "at", "vs_q3": "at", "vs_q4": "at", "vs_q5": "below", "vs_total": "below"}, "expert_bands": {"hiring": "Developing", "activation": "Proactive", "succession": "Developing", "data_integration": "Proactive"}, "bd_notes": null, "rc_notes": "RC1: Komitmen terhadap proses agar tidak ada celah memasukkan orang tanpa filter atau pakai orang dalam.\nRC2: (tidak dijawab)\nRC3: Riset, mutu, dan militer.\nRC4: (tidak dijawab)", "diagnostic_summary": "Pak Taufan, dari PT Dahana, skor diagnostik Anda 17/25 menempatkan organisasi di level Proactive. Profil Anda relatif seimbang (gap 1 poin) dengan kekuatan di Activation dan Data (masing-masing 4/5), sementara Hiring, Succession, dan Integration di 3. Di antara 34 peserta, Activation, Succession, dan Data Anda di atas rata-rata.\n\nSebagai perusahaan BUMN di bidang bahan peledak dan jasa pertambangan, PT Dahana memiliki konteks talent yang sangat spesifik — kebutuhan teknis tinggi, regulasi ketat, dan pool talent yang relatif terbatas.\n\nRefleksi Anda menyentuh isu yang fundamental dan berani: \"komitmen terhadap proses agar tidak ada celah memasukkan orang tanpa filter atau pakai orang dalam.\" Ini concern tentang integritas proses hiring — soal memastikan bahwa meritocracy benar-benar berjalan, bukan hanya di atas kertas. Di konteks BUMN, ini concern yang sangat relevan dan menunjukkan keberanian Anda untuk mengangkatnya.\n\nUntuk succession, Anda menyebutkan posisi yang sangat khas Dahana: \"riset, mutu, dan militer.\" Tiga area ini sangat specialized dan sulit di-hire dari luar — artinya succession planning menjadi lebih kritis karena replacement dari external market sangat terbatas.\n\nMenariknya, Anda hanya menjawab 2 dari 4 pertanyaan RC (hiring fix dan succession positions). Pertanyaan tentang new hire challenges dan key takeaway tidak dijawab — ini bisa mengindikasikan bahwa fokus Anda sangat di sisi systemic (proses dan posisi), bukan di sisi individual experience.\n\nRekan Anda Novita (Manager Kompensasi & Benefit, juga PT Dahana) memberikan perspektif yang komplementer dari sisi kompensasi.", "rc_insight": "[Hiring Fix] Komitmen terhadap proses agar tidak ada celah memasukkan orang tanpa filter atau pakai orang dalam.\n[Key Succession Positions] Riset, mutu, dan militer.\n---\nThemes: hiring improvement awareness, succession positions named. (2/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK PAK TAUFAN\n\nDengan Activation dan Data sebagai kekuatan (masing-masing 4/5), dan konteks Dahana yang sangat specialized, rekomendasi ini fokus pada dua area yang paling impactful.\n\nPRIORITAS 1: Integritas Proses Hiring — Dari Concern ke Safeguard\nAnda menyebutkan keinginan menghilangkan celah untuk \"memasukkan orang tanpa filter atau pakai orang dalam.\" Ini concern yang serius dan perlu tindakan konkret. Solusinya bukan hanya kebijakan — tapi mekanisme: (1) blind screening di tahap awal (nama dan latar belakang tidak terlihat oleh assessor), (2) panel interview minimal 3 orang dari fungsi berbeda, (3) scoring rubrik yang harus diisi SEBELUM diskusi (menghindari groupthink). Ketiga mekanisme ini membuat celah subjektivitas jauh lebih kecil.\n\nSkor Hiring 3/5 menunjukkan proses sudah ada tapi belum fully robust — safeguard di atas bisa mendorong ke level berikutnya sekaligus menjaga integritas.\n\nAREA KEDUA: Succession di Posisi Ultra-Specialized\nRiset, mutu, dan militer — tiga area yang hampir tidak mungkin diisi dari luar. Ini membuat succession planning bukan pilihan, tapi keharusan. Pertanyaan kunci: untuk setiap posisi kritis, berapa lama lead time untuk mempersiapkan successor? Jika jawabannya 3-5 tahun (sangat mungkin untuk posisi teknis ini), maka succession planning harus dimulai SEKARANG.\n\nNovita (rekan dari Dahana) memiliki perspektif dari sisi kompensasi — bersama, Anda berdua bisa memastikan bahwa retention package untuk posisi kritis cukup kompetitif sementara succession dikembangkan.\n\nKEKUATAN YANG BISA DILEVERAGE:\nData 4/5 artinya Dahana sudah punya fondasi data yang cukup baik. Gunakan data ini untuk evidence-based succession: siapa internal talent yang menunjukkan trajectory paling kuat? Performance data bisa menjadi basis objektif untuk succession nomination — mengurangi subjektivitas yang Anda khawatirkan di hiring.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Implementasi minimal satu mekanisme anti-bias di proses hiring — mulai dari scoring rubrik yang wajib diisi sebelum diskusi panel\n2. Dalam 90 hari: Untuk posisi riset, mutu, dan militer — petakan lead time succession masing-masing, identifikasi internal candidate, dan buat accelerated development plan\n3. Dalam 6 bulan: Bersama Novita, review retention package untuk posisi-posisi ultra-specialized — pastikan kompensasi cukup kompetitif untuk mempertahankan talent kritis selama successor dikembangkan\n\nIni bukan perjalanan yang harus dilalui sendiri — kami menyediakan sesi diagnostik mendalam (60 menit, tanpa kewajiban) untuk mapping full talent lifecycle organisasi Anda.", "data_completeness": "Substantial (4/5)"}, {"id": 57, "nama": "Rudhy", "perusahaan": "Tamaris", "jabatan": null, "meja": "Table 8", "pic_table": "Fakhri", "attended": "No", "diagnostic_filled": "No", "scores": null, "total": null, "band": null, "area_terkuat": null, "area_prioritas": null, "gap": null, "gap_text": null, "integration_text": null, "benchmark": null, "expert_bands": null, "bd_notes": null, "rc_notes": null, "diagnostic_summary": null, "rc_insight": null, "personalized_recommendation": null, "data_completeness": "No Data"}, {"id": 58, "nama": "Yayha Zoraya Zainal", "perusahaan": "TechConnect Sinar Mas", "jabatan": "Manager HC", "meja": "Table 8", "pic_table": "Fakhri", "attended": "No", "diagnostic_filled": "No", "scores": null, "total": null, "band": null, "area_terkuat": null, "area_prioritas": null, "gap": null, "gap_text": null, "integration_tex
