ing dan Activation sebagai kekuatan (masing-masing 4/5, di atas rata-rata), Succession juga di atas rata-rata (3/5), sementara Data dan Integration masing-masing 3 tapi di bawah rata-rata. Integration Indicator menunjukkan \"proses jalan, data belum terkoneksi.\"\n\nSebagai Managing Partner — bukan HR professional — perspektif Anda tentang talent maturity sangat berharga karena merefleksikan bagaimana business leader melihat kesiapan people system organisasi.\n\nRefleksi Anda sangat kaya dari sisi hiring: \"culture fit, functioning fit, dan part of the recruitment and onboarding process. User-recruiter adjustment alignment.\" Ini tiga layer fit yang sangat sophisticated: culture, function, dan proses. Ditambah \"user-recruiter alignment\" — Anda melihat bahwa misalignment antara user dan recruiter adalah sumber masalah.\n\nTantangan new hire Anda unik dan holistik: \"supportive organization, environment, and colleagues. Tool at home.\" Menariknya, Anda menyebutkan \"tool at home\" — ini concern yang sangat praktis tentang kesiapan perangkat kerja, sesuatu yang sering diabaikan tapi sangat berpengaruh pada first impression new hire.\n\nUntuk succession, Anda mengidentifikasi tiga posisi inti: \"Head of R&D, Head of Sales and Marketing, Head of Production.\" Ini tiga pilar bisnis FMCG/pangan — inovasi, penjualan, dan produksi. Ketiganya kritis dan sulit diisi dari luar karena butuh industry knowledge yang dalam.", "rc_insight": "[Hiring Fix] Culture fit, functioning fit, dan part of the recruitment and onboarding process. User-recruiter adjustment alignment.\n[New Hire Challenges] Supportive organization, environment, and colleagues. Tool at home.\n[Key Succession Positions] Head of R&D, Head of Sales and Marketing, Head of Production.\n---\nThemes: hiring improvement awareness, onboarding challenges identified, succession positions named. (3/4 RC answered)", "personalized_recommendation": "REKOMENDASI UNTUK PAK DJONI\n\nSebagai Managing Partner, Anda punya vantage point yang berbeda: Anda melihat talent dari perspektif bisnis keseluruhan, bukan dari satu fungsi saja. Rekomendasi ini memanfaatkan perspektif holistik itu.\n\nPRIORITAS 1: Triple Fit Hiring Framework\nAnda mengartikulasikan tiga layer fit yang sangat tepat: culture fit, functioning fit, dan proses alignment. Kebanyakan organisasi hanya mengukur satu atau dua. Pertanyaan: apakah ketiga layer ini sudah diterjemahkan ke dalam rubrik penilaian yang terstruktur? Atau masih berupa \"gut feeling\" saat interview?\n\n\"User-recruiter adjustment alignment\" juga kritis — buat mekanisme formal: sebelum setiap opening, user dan recruiter harus align di semua tiga layer (culture, function, process). Satu meeting 30 menit di awal bisa menghemat berminggu-minggu miskomunikasi.\n\nAREA KEDUA: Succession di Tiga Pilar Bisnis\nHead of R&D, Head of Sales & Marketing, Head of Production — ini tiga posisi yang jika salah satu vacant, bisnis langsung terdampak. Di industri pangan, masing-masing butuh expertise yang sangat spesifik (formulasi produk, distribusi channel, manufacturing compliance). Succession dari luar mahal dan berisiko karena learning curve yang panjang.\n\nUntuk setiap posisi: apakah ada #2 yang sudah diidentifikasi? Apakah mereka sudah diberi exposure ke keputusan strategis? Succession bukan hanya tentang skill transfer — tapi tentang decision-making exposure.\n\nKEKUATAN YANG BISA DILEVERAGE:\nHiring dan Activation 4/5 artinya Anda sudah bisa mendapatkan dan mengaktivasi orang yang tepat. \"Tool at home\" yang Anda sebutkan — meski terdengar kecil — sebenarnya bagian dari activation excellence: memastikan setiap new hire punya segalanya untuk sukses dari hari pertama. Standardisasi checklist onboarding (termasuk perangkat kerja) menunjukkan attention to detail yang membedakan organisasi Proactive dari Developing.\n\nLANGKAH KONKRET:\n1. Dalam 30 hari: Buat Triple Fit Assessment template — satu halaman per posisi yang mendefinisikan culture fit, functioning fit, dan p function init() {
  DATA = EMBEDDED_DATA;
  if (!checkAuth()) return;
  loadReport();
}

function loadReport() {
  populateBDFilter();
  populateDropdown();
  const params = new URLSearchParams(window.location.search);
  const bd = params.get('bd');
  const id = parseInt(params.get('id'));
  if (bd) {
    activeBD = bd;
    document.getElementById('bdFilter').value = bd;
    populateDropdown();
  }
  if (id && DATA.participants.find(p => p.id === id)) {
    renderPerson(id);
  } else {
    const visible = getVisibleParticipants();
    if (visible.length > 0) renderPerson(visible[0].id);
  }
}

function populateBDFilter() {
  const sel = document.getElementById('bdFilter');
  const bds = [...new Set(DATA.participants.map(p => p.pic_table).filter(Boolean))].sort();
  bds.forEach(bd => {
    const count = DATA.participants.filter(p => p.pic_table === bd).length;
    const opt = document.createElement('option');
    opt.value = bd;
    opt.textContent = `${bd} (${count})`;
    sel.appendChild(opt);
  });
}

function getVisibleParticipants() {
  if (!activeBD) return DATA.participants;
  return DATA.participants.filter(p => p.pic_table === activeBD);
}

function filterByBD(bd) {
  activeBD = bd;
  populateDropdown();
  const visible = getVisibleParticipants();
  // Update URL
  const params = new URLSearchParams(window.location.search);
  if (bd) { params.set('bd', bd); } else { params.delete('bd'); }
  // Navigate to first person in filter, or keep current if still visible
  if (currentId && visible.find(p => p.id === currentId)) {
    document.getElementById('personSelect').value = currentId;
    params.set('id', currentId);
  } else if (visible.length > 0) {
    renderPerson(visible[0].id);
    params.set('id', visible[0].id);
  }
  history.replaceState(null, '', '?' + params.toString());
  updateCounter();
}

function populateDropdown() {
  const sel = document.getElementById('personSelect');
  sel.innerHTML = '<option value="">Pilih peserta...</option>';
  getVisibleParticipants().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.id}. ${p.nama} — ${p.perusahaan || ''}`;
    sel.appendChild(opt);
  });
  if (currentId) sel.value = currentId;
}

function updateCounter() {
  const visible = getVisibleParticipants();
  const counter = document.getElementById('bdCounter');
  if (counter) {
    if (activeBD) {
      const idx = currentId ? visible.findIndex(p => p.id === currentId) + 1 : 0;
      counter.textContent = `${idx}/${visible.length}`;
      counter.style.display = 'inline';
    } else {
      counter.style.display = 'none';
    }
  }
}

function navigateTo(id) {
  if (!id) return;
  renderPerson(parseInt(id));
  history.replaceState(null, '', `?id=${id}${activeBD ? '&bd=' + encodeURIComponent(activeBD) : ''}`);
  updateCounter();
}

function prevPerson() {
  if (!currentId || !DATA) return;
  const visible = getVisibleParticipants();
  const idx = visible.findIndex(p => p.id === currentId);
  const prev = idx > 0 ? visible[idx - 1] : visible[visible.length - 1];
  navigateTo(prev.id);
  document.getElementById('personSelect').value = prev.id;
}

function nextPerson() {
  if (!currentId || !DATA) return;
  const visible = getVisibleParticipants();
  const idx = visible.findIndex(p => p.id === currentId);
  const next = idx < visible.length - 1 ? visible[idx + 1] : visible[0];
  navigateTo(next.id);
  document.getElementById('personSelect').value = next.id;
}

function exportPDF() {
  // Show instruction overlay, then print
  showExportInstructions();
}

function showExportInstructions() {
  // Remove existing if any
  const existing = document.querySelector('.export-instructions');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'export-instructions';
  overlay.innerHTML = `
    <div class="ei-backdrop"></div>
    <div class="ei-modal">
      <div class="ei-header">Export PDF — Pengaturan</div>
      <div class="ei-body">
        <p>Saat dialog <strong>Save as PDF</strong> muncul, pastikan pengaturan ini:</p>
        <div class="ei-steps">
          <div class="ei-step">
            <span class="ei-num">1</span>
            <div>
              <strong>Destination:</strong> Save as PDF
            </div>
          </div>
          <div class="ei-step">
            <span class="ei-num">2</span>
            <div>
              <strong>Margins:</strong> None
              <div class="ei-note">Margin sudah diatur dari template — pilih "None" agar tidak double margin.</div>
            </div>
          </div>
          <div class="ei-step">
            <span class="ei-num">3</span>
            <div>
              <strong>Background graphics:</strong> ✓ Centang
              <div class="ei-note">Supaya warna dan visual muncul di PDF.</div>
            </div>
          </div>
        </div>
      </div>
      <div class="ei-footer">
        <button class="ei-btn secondary" onclick="closeExportInstructions()">Batal</button>
        <button class="ei-btn primary" onclick="proceedExport()">Lanjut Export</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeExportInstructions() {
  const el = document.querySelector('.export-instructions');
  if (el) el.remove();
}

function proceedExport() {
  closeExportInstructions();
  setTimeout(() => window.print(), 200);
}

  if (vs === 'above') return { text: 'Di atas rata-rata', cls: 'above' };
  if (vs === 'below') return { text: 'Di bawah rata-rata', cls: 'below' };
  return { text: 'Sama dengan rata-rata', cls: '' };
}

function fmtNarrative(t) {
  if (!t) return '';
  return '<p>' + esc(t).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
}

function fmtRecommendation(text) {
  if (!text) return '';
  let html = esc(text);
  // Detect section headers
  const headings = [
    /^(REKOMENDASI UNTUK .+)$/gm,
    /^(PRIORITAS \d+:.+)$/gm,
    /^(AREA KEDUA:.*)$/gm,
    /^(KEKUATAN YANG BISA DILEVERAGE:.*)$/gm,
    /^(LANGKAH KONKRET:.*)$/gm,
    /^(FOKUS UTAMA:.+)$/gm,
    /^(KEADAAN SAAT INI:.*)$/gm,
    /^(REKOMENDASI STRATEGIS:.*)$/gm
  ];
  // First, mark the main title
  html = html.replace(/^(REKOMENDASI UNTUK .+)$/gm, '%%TITLE%%$1%%/TITLE%%');
  // Section headings
  const secPatterns = [
    /^(PRIORITAS \d+:.+)$/gm,
    /^(AREA KEDUA:.*)$/gm,
    /^(KEKUATAN YANG BISA DILEVERAGE:.*)$/gm,
    /^(LANGKAH KONKRET:.*)$/gm,
    /^(FOKUS UTAMA:.+)$/gm,
    /^(KEADAAN SAAT INI:.*)$/gm,
    /^(REKOMENDASI STRATEGIS:.*)$/gm
  ];
  secPatterns.forEach(pat => {
    html = html.replace(pat, '%%SEC%%$1%%/SEC%%');
  });
  // Numbered steps
  html = html.replace(/^(\d+\.\s)/gm, '<strong>$1</strong>');
  // Convert to HTML
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  // Replace markers
  html = html.replace(/%%TITLE%%(.*?)%%\/TITLE%%/g, '<div style="font-size:15px;font-weight:700;color:var(--c-brand);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--c-brand-light);">$1</div>');
  html = html.replace(/%%SEC%%(.*?)%%\/SEC%%/g, '</p><div class="rec-heading">$1</div><p>');
  return '<div class="rec-body"><p>' + html + '</p></div>';
}

function renderHeader(p, compl) {
  return `
    <div class="header-card">

        <span>${esc(DATA.meta.organizer)}</span>
        <span style="margin-left:auto;font-weight:600;color:var(--c-muted);">${esc(compl)}</span>
      </div>
    </div>
  `;
}

function renderBench(label, score, avg, vs) {
  const v = vsText(vs);
  return `
    <div class="bench-row">
      <div class="bench-dim">
        <span class="bench-dim-name">${label}</span>
        <span class="bench-dim-score"><span class="you">${score}/5</span> &middot; <span class="avg">avg ${avg.toFixed(2)}</span></span>
      </div>
      <div class="bench-track">
        <div class="bench-fill avg" style="width:${barW(avg, 5)}"></div>
        <div class="bench-fill you" style="width:${barW(score, 5)}"></div>
        <div class="bench-avg-marker" style="left:${barW(avg, 5)}"></div>
      </div>
      <div class="bench-vs ${v.cls}">${v.text}</div>
    </div>
  `;
}

function renderRC(text) {
  if (!text) return '';
  const lines = text.split('\n');
  const labels = {
    RC1: 'Apa yang ingin diubah dari proses rekrutmen',
    RC2: 'Tantangan terbesar dengan new hire',
    RC3: '3 posisi kritis tanpa pengganti',
    RC4: 'Key takeaway malam ini'
  };
  let items = [];
  let key = null, val = '';
  lines.forEach(line => {
    const m = line.match(/^(RC[1-4]):\s*(.*)/);
    if (m) {
      if (key && val) items.push({ key, val: val.trim() });
      key = m[1]; val = m[2];
    } else if (key && line.trim()) {
      val += ' ' + line.trim();
    }
  });
  if (key && val) items.push({ key, val: val.trim() });

  return items.map(it => `
    <div class="rc-item">
      <div class="rc-q">${it.key} — ${labels[it.key] || ''}</div>
      <div class="rc-a">"${esc(it.val)}"</div>
    </div>
  `).join('');
}
